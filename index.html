<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coming Soon</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0f172a, #1e3a8a, #2563eb);
      background-size: 200% 200%;
      animation: gradientMove 10s ease infinite;
      color: #fff;
      overflow: hidden;
    }

    @keyframes gradientMove {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .container {
      text-align: center;
      padding: 40px;
      width: 90%;
      max-width: 600px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(15px);
      box-shadow: 0 8px 30px rgba(0,0,0,0.3);
      animation: fadeUp 1.2s ease;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    h1 {
      font-size: 2.5rem;
      font-weight: 600;
      margin-bottom: 10px;
    }

    p {
      opacity: 0.8;
      margin-bottom: 30px;
    }

    .countdown {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin-bottom: 30px;
      flex-wrap: wrap;
    }

    .time-box {
      background: rgba(255,255,255,0.1);
      padding: 15px;
      border-radius: 12px;
      min-width: 70px;
    }

    .time-box span {
      display: block;
      font-size: 1.5rem;
      font-weight: 600;
    }

    .time-box small {
      font-size: 0.7rem;
      opacity: 0.7;
    }

    .email-box {
      display: flex;
      gap: 10px;
      margin-bottom: 25px;
      flex-wrap: wrap;
      justify-content: center;
    }

    input {
      padding: 12px;
      border: none;
      border-radius: 10px;
      outline: none;
      width: 60%;
      min-width: 200px;
    }

    button {
      padding: 12px 18px;
      border: none;
      border-radius: 10px;
      background: #3b82f6;
      color: #fff;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #2563eb;
      transform: scale(1.05);
    }

    .socials {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 10px;
    }

    .socials a {
      color: #fff;
      opacity: 0.8;
      transition: 0.3s;
    }

    .socials a:hover {
      opacity: 1;
      transform: translateY(-3px);
    }

    @media (max-width: 500px) {
      h1 {
        font-size: 2rem;
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Something Awesome is Coming Soon</h1>
    <p>I’m working on exciting personal projects. Stay tuned 🚀</p>

    <!-- Countdown -->
    <div class="countdown">
      <div class="time-box"><span id="days">00</span><small>DAYS</small></div>
      <div class="time-box"><span id="hours">00</span><small>HOURS</small></div>
      <div class="time-box"><span id="minutes">00</span><small>MINUTES</small></div>
      <div class="time-box"><span id="seconds">00</span><small>SECONDS</small></div>
    </div>

    <!-- Email -->
    <div class="email-box">
      <input type="email" placeholder="Enter your email">
      <button>Notify Me</button>
    </div>

    <!-- Socials -->
    <div class="socials">
      <a href="#"><i data-lucide="github"></i></a>
      <a href="#"><i data-lucide="instagram"></i></a>
      <a href="#"><i data-lucide="facebook"></i></a>
    </div>
  </div>

  <script>
    // Countdown Date (set your target date here)
    const targetDate = new Date("2026-12-31 00:00:00").getTime();

    const updateCountdown = () => {
      const now = new Date().getTime();
      const diff = targetDate - now;

      const days = Math.floor(diff / (1000 * 60 * 60 * 24));
      const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
      const minutes = Math.floor((diff / (1000 * 60)) % 60);
      const seconds = Math.floor((diff / 1000) % 60);

      document.getElementById("days").innerText = days.toString().padStart(2, '0');
      document.getElementById("hours").innerText = hours.toString().padStart(2, '0');
      document.getElementById("minutes").innerText = minutes.toString().padStart(2, '0');
      document.getElementById("seconds").innerText = seconds.toString().padStart(2, '0');
    };

    setInterval(updateCountdown, 1000);

    // Load icons
    lucide.createIcons();
  </script>

</body>
</html>
