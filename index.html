<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coming Soon</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0f172a, #1e3a8a, #2563eb);
      background-size: 200% 200%;
      animation: gradientMove 10s ease infinite;
      color: #fff;
      overflow: hidden;
    }

    @keyframes gradientMove {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .container {
      text-align: center;
      padding: 50px 30px;
      width: 90%;
      max-width: 600px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(15px);
      box-shadow: 0 10px 40px rgba(0,0,0,0.35);
      animation: fadeUp 1.2s ease;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(40px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    h1 {
      font-size: 2.6rem;
      font-weight: 600;
      margin-bottom: 10px;
    }

    p {
      opacity: 0.75;
      margin-bottom: 40px;
      font-size: 0.95rem;
    }

    .countdown {
      display: flex;
      justify-content: center;
      gap: 18px;
      flex-wrap: wrap;
    }

    .time-box {
      background: rgba(255,255,255,0.12);
      padding: 18px 15px;
      border-radius: 14px;
      min-width: 80px;
      backdrop-filter: blur(10px);
      transition: 0.3s;
    }

    .time-box:hover {
      transform: translateY(-5px) scale(1.05);
      background: rgba(255,255,255,0.18);
    }

    .time-box span {
      display: block;
      font-size: 1.7rem;
      font-weight: 600;
    }

    .time-box small {
      font-size: 0.7rem;
      opacity: 0.7;
      letter-spacing: 1px;
    }

    .footer {
      margin-top: 35px;
      font-size: 0.75rem;
      opacity: 0.5;
    }

    @media (max-width: 500px) {
      h1 {
        font-size: 2rem;
      }

      .time-box {
        min-width: 65px;
        padding: 15px 10px;
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Coming Soon</h1>
    <p>Something awesome is being built. Stay tuned 🚀</p>

    <div class="countdown">
      <div class="time-box"><span id="days">00</span><small>DAYS</small></div>
      <div class="time-box"><span id="hours">00</span><small>HOURS</small></div>
      <div class="time-box"><span id="minutes">00</span><small>MINUTES</small></div>
      <div class="time-box"><span id="seconds">00</span><small>SECONDS</small></div>
    </div>

    <div class="footer">
      © 2026 Personal Projects
    </div>
  </div>

  <script>
    // Set your target date here
    const targetDate = new Date("2026-12-31T00:00:00").getTime();

    function updateCountdown() {
      const now = new Date().getTime();
      const diff = targetDate - now;

      if (diff <= 0) return;

      const days = Math.floor(diff / (1000 * 60 * 60 * 24));
      const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
      const minutes = Math.floor((diff / (1000 * 60)) % 60);
      const seconds = Math.floor((diff / 1000) % 60);

      document.getElementById("days").innerText = String(days).padStart(2, '0');
      document.getElementById("hours").innerText = String(hours).padStart(2, '0');
      document.getElementById("minutes").innerText = String(minutes).padStart(2, '0');
      document.getElementById("seconds").innerText = String(seconds).padStart(2, '0');
    }

    updateCountdown();
    setInterval(updateCountdown, 1000);
  </script>

</body>
</html>
